services:
  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: nutrition-agent-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333" # REST + Web UI（浏览器打开 http://localhost:6333/dashboard）
      - "6334:6334" # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage:
